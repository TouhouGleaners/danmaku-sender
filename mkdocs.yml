site_name: B站弹幕补档工具
site_description: 现代化 Bilibili 弹幕发送、校验与补档工具
site_author: Miku_oso
site_url: https://TouhouGleaners.github.io/danmaku-sender/

# 仓库信息
repo_name: TouhouGleaners/danmaku-sender
repo_url: https://github.com/TouhouGleaners/danmaku-sender
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs   # 顶部横向导航条
    - navigation.top    # 回到顶部按钮
    - content.code.copy # 代码块一键复制按钮
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition

nav:
  - 🏠 首页: index.md
  - 🚀 快速上手:
      - 准备工作 (获取 Cookie): setup/credentials.md
      - 发送你的第一批弹幕: setup/first_send.md
  - 🛠️ 核心功能指南:
      - 批量发送与频率控制: guides/sender.md
      - 弹幕修复与高级编辑: guides/editor.md
      - 实时监视与丢弹对账: guides/monitor.md
  - 🎨 进阶技巧:
      - 解决时间轴偏移: advanced/offset.md
      - 自定义弹幕包制作: advanced/canvas.md
  - ❓ 常见问题: faq.md