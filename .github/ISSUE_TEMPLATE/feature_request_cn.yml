name: "新功能请求 (Feature Request)"
description: "提出一个新功能的想法或对现有功能的改进建议"
title: "[Feature] "
labels: ["Status: Triage", "Type: Feature"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间来帮助我们改进项目！请详细填写以下内容，以便我们更好地评估你的需求。

  - type: checkboxes
    id: checklist
    attributes:
      label: "提交前的确认"
      description: "在提交前，请确保你已经完成了以下事项。"
      options:
        - label: "我已经搜索过现有的 Issues，确认没有重复的功能请求。"
          required: true
        - label: "我愿意在必要时提供更多关于此功能的详细信息。"
          required: true

  - type: textarea
    id: problem-description
    attributes:
      label: "痛点 / 需求描述 (Is your feature request related to a problem?)"
      description: "请清晰、简洁地描述你当前遇到的问题或使用痛点。"
      placeholder: "例如：目前，每次发完弹幕后，我都必须手动复制 CID 去打开弹幕监视器页面进行核销，步骤有些繁琐。"
    validations:
      required: true

  - type: textarea
    id: solution-description
    attributes:
      label: "期望的解决方案 (Describe the solution you'd like)"
      description: "请详细地描述你希望实现的功能是什么样的。"
      placeholder: "例如：我希望在发送任务结束后，能弹出一个快捷对话框，允许我一键带入当前视频参数并启动监视器。"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "设想的其它解决方案 (Describe alternatives you've considered)"
      description: "你是否考虑过其他的实现方式？"
      placeholder: "例如：或者在发送页面的设置里，加一个“发送完毕后自动转跳并启动监视器”的复选框也可以。"
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "补充信息 (Additional Context)"
      description: "还有其他任何关于这个功能的补充信息吗？比如相关的截图、自己画的草图，或者竞品参考链接。"
    validations:
      required: false