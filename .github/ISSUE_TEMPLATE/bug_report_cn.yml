name: "错误报告 (Bug Report)"
description: "如果你遇到了程序崩溃、功能异常等问题，请使用此模板"
title: "[BUG] "
labels: ["Status: Triage", "Bug: Minor"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间填写这份错误报告！在提交之前，请确保你已经查看过「帮助文档」并搜索过现有的 Issues。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: "提交前的确认"
      options:
        - label: "我使用的是最新版本的软件。"
          required: true
        - label: "我已在现有的 Issues 中搜索过我的问题，确认没有重复提交。"
          required: true

  - type: input
    id: version
    attributes:
      label: "软件版本 (Software Version)"
      description: "请提供你正在使用的软件版本号。可以在菜单栏「帮助 -> 关于」中查看。"
      placeholder: "例如：v2.3.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "操作系统 (Operating System)"
      description: "你使用的是什么操作系统？"
      options:
        - Windows 11
        - Windows 10
        - macOS
        - 其它 (请在补充信息中说明)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "问题描述 (Description)"
      description: "请清晰、简洁地描述你遇到的问题是什么。"
      placeholder: "例如：当我在发射器页面加载了一个包含特殊字符的 XML 弹幕文件并点击发送时，程序直接闪退了。"
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "复现步骤 (Steps to Reproduce)"
      description: "请一步步告诉我们如何复现这个问题。"
      placeholder: |
        1. 打开 '弹幕发射器' 页面
        2. 输入 BV 号 'BV1xx...'
        3. 加载附件中的 'test.xml'
        4. 点击 '开始发送'
        5. 观察到软件无响应并闪退
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "期望行为 (Expected Behavior)"
      description: "你认为正常情况下应该发生什么？"
      placeholder: "例如：程序应该在界面提示文件解析错误，或者跳过错误弹幕，而不是直接崩溃闪退。"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "日志与报错信息 (Logs & Error Messages)"
      description: "强烈建议提供相关日志！请通过菜单栏「文件 -> 打开日志文件夹」获取最新日志，并将相关的报错片段粘贴在这里。"
      render: log
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: "补充信息 (Additional Context)"
      description: "是否开启了系统代理？网络环境如何？或者其他任何有助于定位问题的信息。"
    validations:
      required: false